<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#09090b" />
  <meta name="description" content="Radnus Distribution Management System" />
  <title>Radnus DMS</title>
  <style>
    /* Prevent flash of wrong theme */
    html { background: #09090b; }
    html[data-theme="light"] { background: #f5f5f7; }
  </style>
</head>
<body>
  <noscript>You need to enable JavaScript to run this app.</noscript>
  <div id="root"></div>
  <script>
    // Restore theme before React loads to avoid flash
    const saved = localStorage.getItem('radnus-theme');
    const preferred = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
    document.documentElement.setAttribute('data-theme', saved || preferred);
  </script>
</body>
</html>
